name: Manual Build Windows EXE

on:
  workflow_dispatch: # 允许你手动点击按钮开始打包

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: 1. 拉取仓库代码
      uses: actions/checkout@v4

    - name: 2. 安装 Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 3. 安装依赖库
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 4. 执行 PyInstaller 打包
      run: |
        # 注意这里的文件名必须和仓库里的 main.py 对应
        pyinstaller --onefile --windowed --icon=icon.ico --name "口腔病历生成器v2.3" main.py

    - name: 5. 上传生成的 EXE 文件
      uses: actions/upload-artifact@v4
      with:
        name: Windows_EXE_Package
        path: dist/*.exe
